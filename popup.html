<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
      --accent: #0f3460;
      --border: #2a2a4e;
    }
    
    body { 
      width: 420px; 
      padding: 15px; 
      font-family: system-ui, sans-serif; 
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    h3 { 
      margin: 0 0 10px 0; 
      font-size: 16px; 
      color: var(--text-primary);
    }
    
    .hint { 
      font-size: 11px; 
      color: var(--text-secondary);
      margin-bottom: 8px; 
      line-height: 1.4; 
      background: var(--bg-secondary);
      padding: 8px; 
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    
    textarea { 
      width: 100%; 
      height: 220px; 
      font-family: 'Consolas', monospace; 
      font-size: 12px; 
      padding: 8px; 
      box-sizing: border-box; 
      border: 1px solid var(--border);
      border-radius: 4px;
      resize: vertical;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    
    textarea::placeholder { color: var(--text-secondary); opacity: 0.6; }
    
    .btn { 
      width: 100%; 
      padding: 10px; 
      margin-top: 8px; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 13px; 
      transition: 0.2s;
    }
    
    .btn-scan { background: #28a745; color: white; }
    .btn-scan:hover { background: #218838; }
    .btn-summary { background: #007bff; color: white; }
    .btn-summary:hover { background: #0069d9; }
    .btn-clear { background: #dc3545; color: white; }
    .btn-clear:hover { background: #c82333; }
    
    .status { 
      padding: 8px; 
      margin-top: 10px; 
      border-radius: 4px; 
      font-size: 12px; 
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    
    .status.scanning { background: #fff3cd; color: #856404; border-color: #ffc107; }
    .status.error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
  </style>
</head>
<body>
  <h3>📊 Informatics Analyzer</h3>
  <div class="hint">
    <b>Формат:</b> Название тура, затем ID задач (каждый с новой строки), затем <b>=</b> для разделения туров
  </div>
  <textarea id="taskList" placeholder="Кто ходит на регион по утрам
114593
114595
114596
114597
=
Второй тур
115484
115485"></textarea>
  <button id="scanBtn" class="btn btn-scan">🔍 Сканировать</button>
  <button id="summaryBtn" class="btn btn-summary">📈 Открыть сводку</button>
  <button id="clearBtn" class="btn btn-clear">🗑️ Очистить результаты</button>
  <div id="status" class="status">Готово</div>
  <script src="popup.js"></script>
</body>
</html>
